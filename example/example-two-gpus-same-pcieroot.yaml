apiVersion: v1
kind: Namespace
metadata:
  name: gpu-test

---
## Request two FULL AMD GPUs that share the same PCIe root.
## A single ResourceClaim allocates two GPUs (g0, g1) and constrains them
## to be under the same PCIe root complex using constraints.matchAttribute.
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  namespace: gpu-test
  name: two-gpus-same-pcie-root
spec:
  devices:
    requests:
      - name: g0
        exactly:
          deviceClassName: gpu.amd.com
          allocationMode: ExactCount
          count: 1
          selectors:
            - cel:
                expression: 'device.attributes["gpu.amd.com"].type == "amdgpu"'
      - name: g1
        exactly:
          deviceClassName: gpu.amd.com
          allocationMode: ExactCount
          count: 1
          selectors:
            - cel:
                expression: 'device.attributes["gpu.amd.com"].type == "amdgpu"'
    constraints:
      - matchAttribute: resource.kubernetes.io/pcieRoot
        requests: ["g0", "g1"]

---
apiVersion: v1
kind: Pod
metadata:
  namespace: gpu-test
  name: pod-two-gpus-same-pcie-root
  labels:
    app: pod
spec:
  containers:
    - name: ctr0
      image: docker.io/rocm/pytorch:latest
      command: ["bash", "-c"]
      args: ["echo 'Using two GPUs under the same PCIe root'; export; sleep infinity"]
      resources:
        claims:
          - name: two
  resourceClaims:
    - name: two
      resourceClaimName: two-gpus-same-pcie-root
