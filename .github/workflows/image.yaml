name: Image

on:
  push:
    branches:
      - develop
      - 'release-v*'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - develop
      - main
      - 'release-v*'

# Serialize auto-tag + build per branch to prevent tag race conditions.
# If two merges happen back-to-back, the second waits for the first to finish.
concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Auto-tag and build/push on merge (push events only)
  auto-tag:
    name: Auto Tag
    if: github.event_name == 'push' && github.repository == 'ROCm/k8s-gpu-dra-driver'
    uses: ROCm/common-infra-operator/.github/workflows/auto-tag.yaml@main
    with:
      branch-type: ${{ startsWith(github.ref, 'refs/heads/release-v') && 'release' || 'develop' }}
    permissions:
      contents: write

  build-push:
    name: Build & Push
    needs: auto-tag
    if: github.event_name == 'push' && github.repository == 'ROCm/k8s-gpu-dra-driver'
    uses: ROCm/common-infra-operator/.github/workflows/image-build-push.yaml@main
    with:
      image-registry: docker.io/amdpsdo
      image-name: k8s-gpu-dra-driver
      image-tag: ${{ needs.auto-tag.outputs.tag }}
      push: true
      env-registry: DRIVER_IMAGE_REGISTRY
      env-name: DRIVER_IMAGE_NAME
      env-tag: DRIVER_IMAGE_TAG
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  # Label-gated image build on PRs (build only, no push)
  pr-build:
    name: PR Build
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'ci-run') &&
      github.repository == 'ROCm/k8s-gpu-dra-driver'
    uses: ROCm/common-infra-operator/.github/workflows/image-build-push.yaml@main
    with:
      image-registry: docker.io/amdpsdo
      image-name: k8s-gpu-dra-driver
      image-tag: pr-${{ github.event.pull_request.number }}
      push: false
      env-registry: DRIVER_IMAGE_REGISTRY
      env-name: DRIVER_IMAGE_NAME
      env-tag: DRIVER_IMAGE_TAG

  # Derive a valid SemVer chart version from the auto-tag output
  derive-chart-version:
    name: Derive Chart Version
    if: github.event_name == 'push' && github.repository == 'ROCm/k8s-gpu-dra-driver'
    needs: [auto-tag]
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.derive.outputs.chart-version }}
    steps:
      - name: Derive chart version from auto-tag
        id: derive
        run: |
          set -euo pipefail
          TAG="${{ needs.auto-tag.outputs.tag }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "develop" ]; then
            # develop-4 -> 0.0.0-develop.4
            BUILD_NUM="${TAG#develop-}"
            CHART_VERSION="0.0.0-develop.${BUILD_NUM}"
          else
            # v1.0.0-3 -> 1.0.0-3
            CHART_VERSION="${TAG#v}"
          fi

          echo "Derived chart version: ${CHART_VERSION} from tag: ${TAG}"
          echo "chart-version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

  # Package and push Helm chart to OCI registry after image is pushed
  helm-publish:
    name: Publish Helm Chart
    if: github.event_name == 'push' && github.repository == 'ROCm/k8s-gpu-dra-driver'
    needs: [auto-tag, derive-chart-version, build-push]
    uses: ROCm/common-infra-operator/.github/workflows/helm-oci-push.yaml@main
    with:
      chart-dir: 'helm-charts-k8s'
      chart-version: ${{ needs.derive-chart-version.outputs.chart-version }}
      app-version: ${{ needs.auto-tag.outputs.tag }}
      registry: 'docker.io/amdpsdo'
      image-repository: 'docker.io/amdpsdo/k8s-gpu-dra-driver'
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
